services:
  bambutag:
    image: ghcr.io/faioliii/bambutag:latest
    container_name: bambutag
    restart: unless-stopped
    ports:
      - "${HTTPS_PORT:-9443}:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:rw
    environment:
      - NGINX_PORT=443
      - LOCAL_IP=${LOCAL_IP:-192.168.1.174}
    command: >
      sh -c "if [ ! -f /etc/nginx/ssl/localhost.crt ]; then
               apk add --no-cache openssl &&
               openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
               -keyout /etc/nginx/ssl/localhost.key \
               -out /etc/nginx/ssl/localhost.crt \
               -subj '/CN=localhost' \
               -addext \"subjectAltName=DNS:localhost,IP:127.0.0.1,IP:$$LOCAL_IP\";
             fi &&
             nginx -g 'daemon off;'"
    pull_policy: always
