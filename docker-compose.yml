services:
  bambutag:
    image: ghcr.io/faioliii/bambutag:latest # Dein Image oder der Build-Befehl
    container_name: bambutag
    restart: unless-stopped
    ports:
      - "6443:443"   # HTTPS-Port
    volumes:
      - ./ssl:/etc/nginx/ssl:rw
    environment:
      - NGINX_PORT=443
    command: >
      sh -c "if [ ! -f /etc/nginx/ssl/localhost.crt ]; then
               apk add --no-cache openssl &&
               openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
               -keyout /etc/nginx/ssl/localhost.key \
               -out /etc/nginx/ssl/localhost.crt \
               -subj \"/CN=localhost\" \
               -addext \"subjectAltName=DNS:localhost,IP:127.0.0.1,IP:192.168.1.174\";
             fi &&
             nginx -g 'daemon off;'"
    pull_policy: always
