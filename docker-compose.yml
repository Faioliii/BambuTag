services:
  bambutag:
    image: ghcr.io/faioliii/bambutag:latest
    container_name: bambutag
    restart: unless-stopped
    ports:
      - "${HOST_PORT}:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:rw
    environment:
      - NGINX_PORT=443
      - MY_IP=${MY_IP}
      - HOST_PORT=${HOST_PORT}
    command: >
      sh -c "
      if [ ! -f /etc/nginx/ssl/localhost.crt ]; then
        echo 'Zertifikat nicht gefunden. Installiere OpenSSL...';
        apk add --no-cache openssl;
        echo 'Generiere Zertifikat...';
        openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /etc/nginx/ssl/localhost.key -out /etc/nginx/ssl/localhost.crt -subj '/CN=localhost' -addext 'subjectAltName=DNS:localhost,IP:127.0.0.1,IP:$${MY_IP:-127.0.0.1}';
        echo 'Zertifikat erfolgreich erstellt.';
      else
        echo 'Zertifikat bereits vorhanden.';
      fi;
      echo 'Starte NGINX...';
      nginx -g 'daemon off;'"
    pull_policy: always
