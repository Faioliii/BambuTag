services:
  bambutag:
    image: ghcr.io/faioliii/bambutag:latest
    container_name: bambutag
    restart: unless-stopped
    ports:
      - "6443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:rw
    environment:
      - NGINX_PORT=443
    command: >
      sh -c "
      if [ ! -f /etc/nginx/ssl/localhost.crt ]; then
        echo 'Zertifikat nicht gefunden. Installiere OpenSSL und generiere neue Zertifikate...';
        apk add --no-cache openssl;
        
        # IP-Adresse aus Umgebungsvariable auslesen oder Hostname ermitteln
        TARGET_IP=\"$${MY_IP}\";
        if [ -z \"\$TARGET_IP\" ]; then
          TARGET_IP=\$$(hostname -i | awk '{print \$1}');
        fi;
        
        # Falls die IP immer noch leer ist, nutze 127.0.0.1
        if [ -z \"\$TARGET_IP\" ]; then
          TARGET_IP='127.0.0.1';
        fi;
        
        echo 'Generiere Zertifikat für IP: \$TARGET_IP';
        
        openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
          -keyout /etc/nginx/ssl/localhost.key \
          -out /etc/nginx/ssl/localhost.crt \
          -subj '/CN=localhost' \
          -addext 'subjectAltName=DNS:localhost,IP:127.0.0.1' 2>/dev/null;
          
        echo 'Zertifikat erfolgreich erstellt.';
      else
        echo 'Zertifikat bereits vorhanden. Überspringe Generierung.';
      fi;
      
      echo 'Starte NGINX im Vordergrund...';
      nginx -g 'daemon off;'"
    pull_policy: always
